name: Build Push and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  APP_IMAGE: olegsirik/fastid

jobs:
  build-and-push:
    name: Build #${{ github.run_number }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Gradle caching
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('FastIdAPI/**/*.gradle*', 'FastIdAPI/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build and push all-in-one image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.APP_IMAGE }}:latest
            ${{ env.APP_IMAGE }}:master
            ${{ env.APP_IMAGE }}:${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build summary
        run: echo "Image ${{ env.APP_IMAGE }}:${{ github.run_number }}"

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master' ||
       github.event_name == 'workflow_dispatch') &&
      secrets.SERVER_HOST != '' &&
      secrets.SERVER_USER != '' &&
      secrets.SERVER_SSH_KEY != ''

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ~/FastID || cd /root/FastID || cd /home/${{ secrets.SERVER_USER }}/FastID

            git fetch origin master
            git reset --hard origin/master

            docker pull ${{ env.APP_IMAGE }}:latest

            if [ -f .env ]; then
              docker compose -f docker-compose-published.yml --env-file .env down
              docker compose -f docker-compose-published.yml --env-file .env up -d
            else
              docker compose -f docker-compose-published.yml down
              APP_IMAGE=${{ env.APP_IMAGE }}:latest docker compose -f docker-compose-published.yml up -d
            fi

            sleep 30
            docker compose -f docker-compose-published.yml ps
            docker image prune -f
