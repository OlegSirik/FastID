name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build #${{ github.run_number }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Gradle caching
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('FastIdAPI/**/*.gradle*', 'FastIdAPI/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build images
        run: docker compose build

      - name: Build summary
        run: |
          echo "Images built successfully (FastIdAPI, FastIdFront)"
          docker compose images || true

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ~/FastID || cd /root/FastID || cd /home/${{ secrets.SERVER_USER }}/FastID

            git fetch origin main
            git reset --hard origin/main
            echo "Code updated to $(git rev-parse --short HEAD)"

            if [ -f .env ]; then
              docker compose --env-file .env up --build -d
            else
              docker compose up --build -d
            fi
            echo "Services started"

            sleep 30
            docker compose ps
            docker image prune -f
            echo "Deployment complete"
