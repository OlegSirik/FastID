# Production: single image from Docker Hub (nginx + BFF).
# Run: docker compose -f docker-compose-published.yml --env-file .env up -d

services:
  fastid:
    image: ${APP_IMAGE:-olegsirik/fastid:latest}
    restart: unless-stopped
    environment:
      POLITECH_API_URL: ${POLITECH_API_URL:-http://host.docker.internal:8080}
      TENANT_CODE: ${TENANT_CODE:-demo}
      SERVICE_USER_LOGIN: ${SERVICE_USER_LOGIN:-demo}
      SERVICE_PASSWORD: ${SERVICE_PASSWORD:-demo}
      SERVICE_CLIENT_ID: ${SERVICE_CLIENT_ID:-sys}
      RATE_LIMIT_PREMIUM: ${RATE_LIMIT_PREMIUM:-10}
      RATE_LIMIT_DECRYPT: ${RATE_LIMIT_DECRYPT:-20}
      RATE_LIMIT_SECURE_LINK: ${RATE_LIMIT_SECURE_LINK:-10}
      FASTID_SECURE_LINK_SECRET: ${FASTID_SECURE_LINK_SECRET:-change-me-in-production}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${FASTID_FRONT_PORT:-8082}:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
